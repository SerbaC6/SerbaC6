name: Generate GitHub Metrics
on:
  # Triggers the workflow every 24 hours
  schedule: [{cron: "0 0 * * *"}]
  # Allows you to run the workflow manually from the Actions tab
  workflow_dispatch:
  # Runs when you update this file
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # This connects to the secret you just made
          token: ${{ secrets.METRICS_TOKEN }}
          
          # The visual configuration matching your screenshot
          template: classic
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: percentage
          plugin_lines: yes
